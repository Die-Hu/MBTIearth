<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MBTI Earth - Global Personality Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="https://d3js.org/d3-array.v3.min.js"></script>
  <script src="https://d3js.org/d3-geo.v3.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="map"></div>

  <div class="search-bar">
    <div class="search-inner">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search countries..." autocomplete="off">
    </div>
    <div id="search-results" class="search-results"></div>
  </div>

  <div id="legend" class="legend">
    <div class="legend-header" id="legend-toggle">
      <span class="legend-title">MBTI Types</span>
      <svg class="legend-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="legend-body" id="legend-body"></div>
  </div>

  <div id="tooltip" class="map-tooltip"></div>

  <div id="info-panel" class="info-panel">
    <div class="panel-handle" id="panel-handle"><span></span></div>
    <div class="panel-scroll" id="panel-scroll">
      <div id="panel-content"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/colors.js"></script>
  <script src="js/map.js"></script>
  <script src="js/panels.js"></script>
  <script src="js/search.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
